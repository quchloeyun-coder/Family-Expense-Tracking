<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#667eea" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家账" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>家庭共享记账</title>
  <style>
    html, body { margin: 0; padding: 0; background: #f5f6fa; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    button { font-family: inherit; -webkit-tap-highlight-color: transparent; }
    * { box-sizing: border-box; }
    /* Splash screen */
    #splash { position: fixed; inset: 0; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity .3s; }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash .logo { font-size: 56px; margin-bottom: 12px; }
    #splash .title { color: #fff; font-size: 20px; font-weight: 700; }
    #splash .dots { display: flex; gap: 6px; margin-top: 20px; }
    #splash .dots span { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.4); animation: pulse 1.2s infinite; }
    #splash .dots span:nth-child(2) { animation-delay: .2s; }
    #splash .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes pulse { 0%,80%,100% { transform: scale(.6); opacity: .4; } 40% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <!-- Splash screen: visible immediately, hidden when app loads -->
  <div id="splash">
    <div class="logo">💰</div>
    <div class="title">家庭记账</div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>

  <div id="root"></div>

  <!-- React only (no Babel!) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Firebase v10 -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
    import { getFirestore, collection, doc, getDoc, getDocs, setDoc, query, where }
      from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';
    import { getAuth, signInAnonymously }
      from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
    import { firebaseConfig } from './firebase-config.js';

    try {
      if (!firebaseConfig || !firebaseConfig.apiKey || firebaseConfig.apiKey.includes('YOUR_')) {
        window.FirebaseReady = false;
      } else {
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        await signInAnonymously(auth);
        window.FirebaseDB = db;
        window.FirebaseModule = { collection, doc, getDoc, getDocs, setDoc, query, where };
        window.FirebaseReady = true;
      }
    } catch (e) {
      console.error('Firebase init failed', e);
      window.FirebaseReady = false;
    }
    window.dispatchEvent(new Event('firebase-init-done'));
  </script>

  <!-- Storage layer -->
  <script type="module">
    import * as Storage from './storage.js';
    window.FamilyStorage = Storage;
    window.dispatchEvent(new Event('storage-ready'));
  </script>

  <!-- App loader: no Babel needed, app.js is plain JS -->
  <script>
    let fbDone = false, stDone = false;
    function tryStart() {
      if (!fbDone || !stDone) return;
      const s = document.createElement('script');
      s.src = './app.js';
      s.onload = () => {
        // Hide splash after app renders
        setTimeout(() => {
          const sp = document.getElementById('splash');
          if (sp) { sp.classList.add('hide'); setTimeout(() => sp.remove(), 300); }
        }, 100);
      };
      document.body.appendChild(s);
    }
    window.addEventListener('firebase-init-done', () => { fbDone = true; tryStart(); });
    window.addEventListener('storage-ready', () => { stDone = true; tryStart(); });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
